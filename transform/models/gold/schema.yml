version: 2

models:
  - name: gold_companies
    description: "Prospect mart — one row per LLM-verified business prospect."
    columns:
      - name: domain
        description: "Company domain (the prospect key)."
        tests:
          - not_null
          - unique
      - name: segment
        tests:
          - accepted_values:
              values: ["commercial", "education", "government", "nonprofit", "other"]
      - name: score
        tests:
          - not_null

  - name: gold_company_services
    description: "Exposed services per prospect company (detail-page drill-down)."
    columns:
      - name: domain
        tests:
          - not_null
